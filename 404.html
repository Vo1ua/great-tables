<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Great Tables</title>
  <meta name="robots" content="noindex, follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper: #F7F8F5;
      --card: #FFFFFF;
      --ink: #1C2B2E;
      --ink-soft: #4B5D60;
      --grid-line: #DCE3E0;
      --sheet-green: #1E7145;
      --sheet-green-soft: #E6F1EA;
      --cell-highlight: #FFF2B2;
      --error-red: #B3413A;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--paper);
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 32px 32px;
      color: var(--ink);
      font-family: 'Source Serif 4', Georgia, serif;
      line-height: 1.65;
      font-size: 18px;
      min-height: 100vh;
    }

    .col-strip {
      display: flex;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--ink-soft);
      background: var(--card);
      border-bottom: 1px solid var(--grid-line);
    }
    .col-strip span {
      flex: 1;
      text-align: center;
      padding: 6px 0;
      border-right: 1px solid var(--grid-line);
    }
    .col-strip span:last-child { border-right: none; }

    .formula-bar {
      background: var(--card);
      border-bottom: 1px solid var(--grid-line);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      max-width: 760px;
      margin: 0 auto;
    }
    .formula-bar .fx {
      font-family: 'IBM Plex Mono', monospace;
      font-style: italic;
      color: var(--error-red);
      font-weight: 600;
      font-size: 15px;
    }
    .formula-bar .formula-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      color: var(--ink-soft);
      border-left: 1px solid var(--grid-line);
      padding-left: 14px;
    }

    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--grid-line);
      border-radius: 4px;
      padding: 56px 40px;
      box-shadow: 0 1px 3px rgba(28, 43, 46, 0.06);
    }

    .error-code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      color: var(--error-red);
      background: #FBEAE8;
      border: 1px solid #F0C9C5;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 3px;
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 700;
      font-size: 28px;
      margin: 0 0 16px;
    }

    p {
      color: var(--ink-soft);
      margin: 0 0 32px;
      font-size: 17px;
    }

    .home-link {
      display: inline-block;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: #FFFFFF;
      background: var(--sheet-green);
      padding: 12px 28px;
      border-radius: 4px;
      text-decoration: none;
    }
    .home-link:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <div class="col-strip">
    <span>A</span><span>B</span><span>C</span><span>D</span><span>E</span><span>F</span><span>G</span><span>H</span>
  </div>

  <div class="formula-bar">
    <span class="fx">#REF!</span>
    <span class="formula-text">This cell no longer exists</span>
  </div>

  <main>
    <div class="card">
      <div class="error-code">404 — Page Not Found</div>
      <h1>This page took a wrong turn.</h1>
      <p>
        The page you're looking for doesn't exist — it may have been moved or the link might
        be outdated. Let's get you back to something useful.
      </p>
      <a class="home-link" href="index.html">Back to Great Tables</a>
    </div>
  </main>

</body>
</html>
