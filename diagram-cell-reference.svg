<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1E7145"/>
    </marker>
  </defs>

  <rect width="700" height="320" fill="#F7F8F5"/>

  <!-- Sales tab -->
  <rect x="40" y="60" width="230" height="180" rx="4" fill="#FFFFFF" stroke="#DCE3E0" stroke-width="1.5"/>
  <rect x="40" y="60" width="230" height="34" rx="4" fill="#E6F1EA"/>
  <text x="155" y="82" font-family="IBM Plex Mono, monospace" font-size="14" font-weight="600" fill="#1E7145" text-anchor="middle">Sales tab</text>

  <!-- grid rows inside Sales -->
  <line x1="40" y1="130" x2="270" y2="130" stroke="#DCE3E0"/>
  <line x1="40" y1="166" x2="270" y2="166" stroke="#DCE3E0"/>
  <line x1="40" y1="202" x2="270" y2="202" stroke="#DCE3E0"/>
  <line x1="155" y1="94" x2="155" y2="240" stroke="#DCE3E0"/>

  <text x="60" y="118" font-family="IBM Plex Mono, monospace" font-size="12" fill="#4B5D60">Item</text>
  <text x="60" y="154" font-family="IBM Plex Mono, monospace" font-size="12" fill="#4B5D60">Chairs</text>
  <text x="60" y="190" font-family="IBM Plex Mono, monospace" font-size="12" fill="#4B5D60">Desks</text>

  <rect x="165" y="140" width="95" height="30" fill="#FFF2B2" stroke="#E8D98A"/>
  <text x="212" y="160" font-family="IBM Plex Mono, monospace" font-size="13" font-weight="600" fill="#4A3F00" text-anchor="middle">D5 = 420</text>

  <!-- Summary tab -->
  <rect x="430" y="60" width="230" height="180" rx="4" fill="#FFFFFF" stroke="#DCE3E0" stroke-width="1.5"/>
  <rect x="430" y="60" width="230" height="34" rx="4" fill="#E6F1EA"/>
  <text x="545" y="82" font-family="IBM Plex Mono, monospace" font-size="14" font-weight="600" fill="#1E7145" text-anchor="middle">Summary tab</text>

  <line x1="430" y1="130" x2="660" y2="130" stroke="#DCE3E0"/>
  <line x1="545" y1="94" x2="545" y2="240" stroke="#DCE3E0"/>

  <rect x="555" y="100" width="95" height="30" fill="#FFF2B2" stroke="#E8D98A"/>
  <text x="602" y="120" font-family="IBM Plex Mono, monospace" font-size="13" font-weight="600" fill="#4A3F00" text-anchor="middle">B2</text>

  <!-- Arrow connecting the two -->
  <path d="M 270 155 C 350 155, 350 115, 550 115" fill="none" stroke="#1E7145" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Formula label above the arrow -->
  <rect x="330" y="10" width="180" height="34" rx="4" fill="#FFFFFF" stroke="#1E7145" stroke-width="1.5"/>
  <text x="420" y="32" font-family="IBM Plex Mono, monospace" font-size="14" font-weight="600" fill="#1E7145" text-anchor="middle">=Sales!D5</text>

  <text x="350" y="290" font-family="Source Serif 4, Georgia, serif" font-size="15" fill="#4B5D60" text-anchor="middle">
    Summary!B2 pulls its value directly from Sales!D5
  </text>
</svg>
